<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>畢業典禮字幕控制後台 - 升級版</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1e1b4b, #311042, #4c0519); /* 稍微調暗背景，讓玻璃感更清透 */
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* macOS MenuBar */
        .menu-bar {
            height: 30px;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        /* Liquid Glass 主要工作區 */
        .main-container {
            margin: 20px;
            height: calc(100vh - 140px);
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-live {
            background: rgba(239, 68, 68, 0.4);
            border-color: rgba(239, 68, 68, 0.6);
        }
        .btn-live:hover {
            background: rgba(239, 68, 68, 0.7);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
        }

        /* 字幕列表區 */
        .subtitle-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .subtitle-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .subtitle-preview-text {
            flex: 1;
            margin-right: 20px;
        }

        .item-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .drag-handle {
            cursor: grab;
            padding: 5px;
            font-size: 20px;
            user-select: none;
            opacity: 0.5;
        }

        /* macOS 彈出視窗 (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal {
            background: rgba(30, 30, 30, 0.85);
            border: 1px solid rgba(255,255,255,0.25);
            backdrop-filter: blur(30px);
            width: 500px;
            border-radius: 14px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            color: white;
            overflow: hidden;
        }

        .modal-header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modal-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 讓橫向排列的控制項更美觀 */
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }

        .form-group input[type="text"], .form-group select {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px;
            border-radius: 8px;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .range-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .range-container input[type="range"] {
            flex: 1;
            accent-color: #007aff;
        }

        /* ✨ 新增：Modal 內的即時字幕預覽區（模擬黑底大螢幕效果） */
        .modal-preview-box {
            background: #000000;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 10px;
        }

        .modal-preview-speaker {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 5px;
            font-weight: 500;
        }

        .modal-preview-text {
            font-weight: bold;
            word-break: break-all;
            line-height: 1.3;
        }

        .modal-footer {
            padding: 15px 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* macOS Dock */
        .dock-container {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 20px;
            display: flex;
            gap: 15px;
            box-shadow: var(--glass-shadow);
        }
        .dock-item {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.2s;
        }
        .dock-item:hover {
            transform: scale(1.2) translateY(-10px);
        }
    </style>
</head>
<body>

    <div class="menu-bar">
        <div> SubtitleControl</div>
        <div id="status">前台系統運作中</div>
    </div>

    <div class="main-container">
        <div class="action-bar">
            <div>
                <button class="btn" onclick="openModal()">＋ 新增字幕</button>
                <button class="btn" onclick="clearAllLive()">清除前台畫面</button>
            </div>
            <div>
                <input type="file" id="bgUpload" accept="image/*" style="display:none" onchange="uploadBackground(event)">
                <button class="btn" onclick="document.getElementById('bgUpload').click()">變更前台背景圖</button>
            </div>
        </div>

        <div class="subtitle-list" id="subtitleList">
            </div>
    </div>

    <div class="dock-container">
        <div class="dock-item" title="字幕管理">📝</div>
        <div class="dock-item" title="畫布編輯">🎨</div>
        <div class="dock-item" title="設定">⚙️</div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header" id="modalTitle">新增字幕項目</div>
            <div class="modal-body">
                
                <div class="form-group">
                    <label>字幕內容</label>
                    <input type="text" id="subText" placeholder="請輸入字幕文字..." oninput="updateLivePreview()">
                </div>

                <div class="form-group">
                    <label>講者標籤 (選填)</label>
                    <input type="text" id="subSpeaker" placeholder="例如：畢業生代表" oninput="updateLivePreview()">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>文字顏色</label>
                        <input type="color" id="subColor" value="#ffffff" style="width:100%; height:38px; border:none; background:none; cursor:pointer;" oninput="updateLivePreview()">
                    </div>
                    <div class="form-group">
                        <label>登場動畫</label>
                        <select id="subAnimation">
                            <option value="none">無特效</option>
                            <option value="fade">淡入 (Fade)</option>
                            <option value="slide">上滑 (Slide Up)</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>字體大小: <span id="fontSizeVal">56</span>px</label>
                    <div class="range-container">
                        <input type="range" id="subSize" min="24" max="100" value="56" oninput="updateLivePreview()">
                    </div>
                </div>

                <div class="form-group">
                    <label>🔍 即時畫面預覽 (模擬大螢幕)</label>
                    <div class="modal-preview-box">
                        <div class="modal-preview-speaker" id="preSpeaker"></div>
                        <div class="modal-preview-text" id="preText">預覽文字</div>
                    </div>
                </div>

            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn" style="background:#007aff; border-color:#007aff;" onclick="saveSubtitle()">儲存項目</button>
            </div>
        </div>
    </div>

    <script>
        const channel = new BroadcastChannel('ceremony_subtitles');
        
        // 預設資料中加入了 size 屬性
        let subtitles = JSON.parse(localStorage.getItem('subtitles')) || [
            { id: 1, text: "各位師長、各位同學，大家好。", speaker: "在校生代表", color: "#ffffff", size: "56", animation: "slide" },
            { id: 2, text: "祝大家畢業快樂，鵬程萬里！", speaker: "畢業生代表", color: "#ffeb3b", size: "64", animation: "fade" }
        ];
        
        let editId = null;

        function renderList() {
            const listEl = document.getElementById('subtitleList');
            listEl.innerHTML = '';
            subtitles.forEach((sub, index) => {
                const item = document.createElement('div');
                item.className = 'subtitle-item';
                item.innerHTML = `
                    <div class="subtitle-preview-text">
                        <small style="color: rgba(255,255,255,0.5); display:block;">[${sub.speaker || '無標籤'}] (大小: ${sub.size || 56}px)</small>
                        <span style="color: ${sub.color}; font-size: 18px;">${sub.text}</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn btn-live" onclick="sendToLive(${index})">放送</button>
                        <button class="btn" onclick="editSubtitle(${sub.id})">編輯</button>
                        <button class="btn" style="background:rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.3);" onclick="deleteSubtitle(${sub.id}, '${sub.text}')">刪除</button>
                        <div class="drag-handle">☰</div>
                    </div>
                `;
                listEl.appendChild(item);
            });
            localStorage.setItem('subtitles', JSON.stringify(subtitles));
        }

        // 當使用者在 Modal 裡面輸入或調整滑桿時，即時觸發這個 function
        function updateLivePreview() {
            const text = document.getElementById('subText').value || "（請輸入字幕內容）";
            const speaker = document.getElementById('subSpeaker').value;
            const color = document.getElementById('subColor').value;
            const size = document.getElementById('subSize').value;

            // 更新數值文字顯示
            document.getElementById('fontSizeVal').innerText = size;

            // 更新預覽區樣式與內容
            const preSpeaker = document.getElementById('preSpeaker');
            const preText = document.getElementById('preText');

            preSpeaker.innerText = speaker ? `【 ${speaker} 】` : '';
            preText.innerText = text;
            preText.style.color = color;
            
            // 為了不讓彈出視窗被撐得太大，預覽區的字體做 0.5 倍的縮放顯示，但比例是完全一樣的
            preText.style.fontSize = (size * 0.5) + 'px'; 
        }

        function openModal() {
            editId = null;
            document.getElementById('modalTitle').innerText = "新增字幕項目";
            document.getElementById('subText').value = "";
            document.getElementById('subSpeaker').value = "";
            document.getElementById('subColor').value = "#ffffff";
            document.getElementById('subSize').value = "56";
            document.getElementById('subAnimation').value = "none";
            document.getElementById('modalOverlay').style.display = 'flex';
            updateLivePreview(); // 重新整理預覽
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function saveSubtitle() {
            const text = document.getElementById('subText').value;
            const speaker = document.getElementById('subSpeaker').value;
            const color = document.getElementById('subColor').value;
            const size = document.getElementById('subSize').value;
            const animation = document.getElementById('subAnimation').value;

            if(!text) return alert('請輸入字幕內容');

            if(editId) {
                const sub = subtitles.find(s => s.id === editId);
                sub.text = text; sub.speaker = speaker; sub.color = color; sub.size = size; sub.animation = animation;
            } else {
                subtitles.push({ id: Date.now(), text, speaker, color, size, animation });
            }
            renderList();
            closeModal();
        }

        function editSubtitle(id) {
            const sub = subtitles.find(s => s.id === id);
            editId = id;
            document.getElementById('modalTitle').innerText = "編輯字幕項目";
            document.getElementById('subText').value = sub.text;
            document.getElementById('subSpeaker').value = sub.speaker;
            document.getElementById('subColor').value = sub.color;
            document.getElementById('subSize').value = sub.size || "56";
            document.getElementById('subAnimation').value = sub.animation || "none";
            document.getElementById('modalOverlay').style.display = 'flex';
            updateLivePreview(); // 載入舊資料並顯示預覽
        }

        function deleteSubtitle(id, text) {
            if(confirm(`是否要刪除「${text}」？`)) {
                subtitles = subtitles.filter(s => s.id !== id);
                renderList();
            }
        }

        function sendToLive(index) {
            const sub = subtitles[index];
            channel.postMessage({ type: 'UPDATE_SUBTITLE', data: sub });
        }

        function clearAllLive() {
            channel.postMessage({ type: 'CLEAR' });
        }

        function uploadBackground(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    channel.postMessage({ type: 'UPDATE_BG', data: e.target.result });
                };
                reader.readAsDataURL(file);
            }
        }

        renderList();
    </script>
</body>
</html>
