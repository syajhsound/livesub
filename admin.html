<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>典禮字幕控制後台</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            --text-color: #ffffff;
            --accent-color: #007aff;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            overflow: hidden; height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* macOS MenuBar */
        .menu-bar {
            height: 30px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 99999 !important;
        }

        .menu-left { 
            display: flex; 
            gap: 20px; 
            align-items: center; 
            position: relative;
            z-index: 100000;
        }

        .menu-item { 
            position: relative; 
            cursor: pointer; 
            padding: 2px 8px; 
            border-radius: 4px; 
            user-select: none;
        }
        .menu-item:hover, .menu-item.show { background: rgba(255, 255, 255, 0.15); }

        /* macOS 下拉選單 */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 25px; 
            left: 0;
            background: rgba(40, 40, 40, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            min-width: 200px;
            padding: 5px 0;
            margin: 0;
            z-index: 100001 !important;
        }
        
        .menu-item.show .dropdown-menu { display: block; }

        .dropdown-menu li {
            list-style: none;
            padding: 6px 15px;
            font-size: 13px;
            color: #fff;
            cursor: pointer;
        }
        .dropdown-menu li:hover { background: var(--accent-color); }
        .dropdown-menu .menu-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 4px 0; }
        .dropdown-menu .menu-action { color: #a5b4fc; font-weight: 500; }

        /* 當前場景標示 */
        #currentSceneDisplay {
            background: rgba(0, 122, 255, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid rgba(0, 122, 255, 0.5);
        }

        /* 工作區 */
        .main-container {
            margin: 20px;
            height: calc(100vh - 140px);
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .action-bar { display: flex; justify-content: space-between; margin-bottom: 20px; }

        .btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white; padding: 8px 16px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-1px); }
        .btn-live { background: rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.6); }
        .btn-live:hover { background: rgba(239, 68, 68, 0.6); }

        .subtitle-list { flex: 1; overflow-y: auto; }
        .subtitle-item {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }

        /* CSS Button 講者標籤樣式 */
        .speaker-badge {
            display: inline-block;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(147, 51, 234, 0.2));
            border: 1px solid rgba(147, 51, 234, 0.4);
            color: #e0e7ff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            margin-bottom: 6px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 600000;
        }
        .modal {
            background: rgba(30, 30, 30, 0.9); border: 1px solid rgba(255,255,255,0.2);
            width: 480px; border-radius: 14px; color: white; overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group input, .form-group select {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 10px; border-radius: 8px; color: white; outline: none; font-size: 14px;
        }
        .form-group select option { background: #222; color: #fff; }

        .modal-preview-box {
            background: #000; border-radius: 8px; padding: 15px;
            min-height: 60px; text-align: center; margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="menu-bar">
        <div class="menu-left">
            <div style="font-weight: bold; user-select: none; margin-right: 10px;"> 典禮字幕控制後台</div>
            
            <div class="menu-item" onclick="toggleMenu(event, this)">檔案
                <ul class="dropdown-menu">
                    <li onclick="event.stopPropagation(); exportProject();">匯出整份專案 (.json)</li>
                    <li onclick="event.stopPropagation(); document.getElementById('importFile').click();">匯入專案資料...</li>
                </ul>
            </div>

            <div class="menu-item" onclick="toggleMenu(event, this)">使用場景
                <ul class="dropdown-menu" id="sceneDropdown">
                    </ul>
            </div>
        </div>
        <div>
            <span id="currentSceneDisplay">目前場景：未載入</span>
        </div>
    </div>

    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importProject(event)">

    <div class="main-container">
        <div class="action-bar">
            <div>
                <button class="btn" onclick="openModal();">＋ 新增字幕</button>
                <button class="btn" onclick="clearAllLive();">清除前台畫面</button>
            </div>
            <div>
                <input type="file" id="bgUpload" accept="image/*" style="display:none" onchange="uploadBackground(event)">
                <button class="btn" onclick="document.getElementById('bgUpload').click()">變更前台背景圖</button>
            </div>
        </div>

        <div class="subtitle-list" id="subtitleList"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-body">
                <h3 id="modalTitle" style="margin-top:0;">新增字幕項目</h3>
                <div class="form-group">
                    <label>字幕內容</label>
                    <input type="text" id="subText" placeholder="請輸入字幕..." oninput="updateLivePreview()">
                </div>
                
                <div class="form-group">
                    <label>講者標籤</label>
                    <select id="subSpeakerSelect" onchange="handleSpeakerSelectChange()">
                        </select>
                </div>

                <div style="display:flex; gap:10px;">
                    <div class="form-group" style="flex:1;">
                        <label>顏色</label>
                        <input type="color" id="subColor" value="#ffffff" oninput="updateLivePreview()" style="height:40px; padding:0; width:100%;">
                    </div>
                    <div class="form-group" style="flex:1;">
                        <label>字體大小 (<span id="fontSizeVal">56</span>px)</label>
                        <input type="range" id="subSize" min="24" max="100" value="56" oninput="updateLivePreview()">
                    </div>
                </div>
                <div class="form-group">
                    <label>登場動畫</label>
                    <select id="subAnimation">
                        <option value="none">無特效</option>
                        <option value="fade">淡入 (Fade)</option>
                        <option value="slide">上滑 (Slide Up)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🔍 即時畫面預覽</label>
                    <div class="modal-preview-box">
                        <div id="preSpeaker" style="font-size:12px; color:rgba(255,255,255,0.6); margin-bottom:5px;"></div>
                        <div id="preText" style="font-weight:bold; word-break:break-all; line-height:1.3;"></div>
                    </div>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
                    <button class="btn" onclick="closeModal()">取消</button>
                    <button class="btn" style="background:var(--accent-color); border-color:var(--accent-color);" onclick="saveSubtitle()">儲存到瀏覽器</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 防止環境阻擋 BroadcastChannel 導致整段 JS 癱瘓的安控機制
        let channel;
        try {
            channel = new BroadcastChannel('ceremony_subtitles');
        } catch(e) {
            console.warn("BroadcastChannel 無法在此環境啟用，改採本地模式運作。");
            channel = { postMessage: function(msg) { console.log("模擬發送前台:", msg); } };
        }
        
        // 核心資料庫初始化與相容防護
        let projectData;
        try {
            const rawData = localStorage.getItem('ceremony_project');
            if (rawData) {
                projectData = JSON.parse(rawData);
                // 確保關鍵陣列結構與欄位完整存在
                if (!projectData.scenes) projectData.scenes = {};
                if (!projectData.speakers) projectData.speakers = ["無標籤", "畢業生代表", "在校生代表", "校長"];
                if (!projectData.currentScene) projectData.currentScene = Object.keys(projectData.scenes)[0] || "預設場景";
            } else {
                throw new Error("No existing data");
            }
        } catch(e) {
            // 資料毀損或初次載入，初始化整套乾淨、完整的資料結構
            projectData = {
                currentScene: "場景 A：畢業生致詞",
                speakers: ["無標籤", "畢業生代表", "在校生代表", "校長", "家長會長", "特別貴賓"],
                scenes: {
                    "場景 A：畢業生致詞": [
                        { id: 1, text: "親愛的師長、同學們，大家平安。", speaker: "畢業生代表", color: "#ffffff", size: "56", animation: "slide" }
                    ],
                    "場景 B：在校生致詞": [
                        { id: 2, text: "展翅高飛吧！學長學姐們！", speaker: "在校生代表", color: "#ffeb3b", size: "60", animation: "fade" }
                    ],
                    "場景 C：校長及貴賓致詞": []
                }
            };
        }

        let editId = null;

        // MenuBar 控制
        function toggleMenu(event, element) {
            event.stopPropagation();
            const isShown = element.classList.contains('show');
            closeAllMenus();
            if (!isShown) {
                element.classList.add('show');
            }
        }

        function closeAllMenus() {
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('show');
            });
        }

        document.addEventListener('click', function() {
            closeAllMenus();
        });

        // 🟢 儲存功能：自動儲存至 localStorage（GitHub Pages 靜態環境最速、最穩定的儲存手段）
        function saveToStorage() {
            try {
                localStorage.setItem('ceremony_project', JSON.stringify(projectData));
            } catch (e) {
                console.error("儲存失敗，可能是隱私模式禁用了 LocalStorage", e);
            }
        }

        // 渲染 MenuBar 場景
        function renderSceneMenu() {
            const dropdown = document.getElementById('sceneDropdown');
            if(!dropdown) return;
            dropdown.innerHTML = '';

            Object.keys(projectData.scenes).forEach(sceneName => {
                const li = document.createElement('li');
                li.innerText = sceneName;
                li.onclick = (e) => {
                    e.stopPropagation();
                    switchScene(sceneName);
                    closeAllMenus();
                };
                dropdown.appendChild(li);
            });

            const divider = document.createElement('div');
            divider.className = 'menu-divider';
            dropdown.appendChild(divider);

            const addLi = document.createElement('li');
            addLi.className = 'menu-action';
            addLi.innerText = '＋ 新增自訂場景...';
            addLi.onclick = (e) => {
                e.stopPropagation();
                addNewScene();
            };
            dropdown.appendChild(addLi);
        }

        function addNewScene() {
            const newSceneName = prompt('請輸入新場景名稱：');
            if (!newSceneName || newSceneName.trim() === '') return;
            
            if (projectData.scenes[newSceneName]) {
                alert('此場景名稱已存在！');
                return;
            }

            projectData.scenes[newSceneName] = [];
            projectData.currentScene = newSceneName;
            
            saveToStorage(); // 儲存變更
            renderSceneMenu();
            renderList();
            closeAllMenus();
        }

        function populateSpeakerSelect() {
            const select = document.getElementById('subSpeakerSelect');
            if(!select) return;
            select.innerHTML = '';

            projectData.speakers.forEach(speaker => {
                const opt = document.createElement('option');
                opt.value = speaker;
                opt.innerText = speaker;
                select.appendChild(opt);
            });

            const optAdd = document.createElement('option');
            optAdd.value = "__ADD_NEW__";
            optAdd.innerText = "＋ 新增自訂標籤...";
            optAdd.style.color = "#a5b4fc";
            select.appendChild(optAdd);
        }

        function handleSpeakerSelectChange() {
            const select = document.getElementById('subSpeakerSelect');
            if (select.value === "__ADD_NEW__") {
                const newSpeaker = prompt('請輸入新講者標籤名稱：');
                if (newSpeaker && newSpeaker.trim() !== '') {
                    if (!projectData.speakers.includes(newSpeaker)) {
                        projectData.speakers.push(newSpeaker);
                        saveToStorage(); // 儲存新增的講者標籤
                    }
                    populateSpeakerSelect();
                    select.value = newSpeaker;
                } else {
                    select.value = "無標籤";
                }
            }
            updateLivePreview();
        }

        // 渲染主列表面版（含新增、編輯功能修復）
        function renderList() {
            // 避免空值造成網頁錯誤
            if (!projectData.scenes[projectData.currentScene]) {
                const availableScenes = Object.keys(projectData.scenes);
                if (availableScenes.length > 0) {
                    projectData.currentScene = availableScenes[0];
                } else {
                    projectData.scenes["預設場景"] = [];
                    projectData.currentScene = "預設場景";
                }
            }

            document.getElementById('currentSceneDisplay').innerText = `目前場景：${projectData.currentScene}`;
            const listEl = document.getElementById('subtitleList');
            if(!listEl) return;
            listEl.innerHTML = '';
            
            const currentSubtitles = projectData.scenes[projectData.currentScene] || [];

            currentSubtitles.forEach((sub, index) => {
                const item = document.createElement('div');
                item.className = 'subtitle-item';
                
                const speakerDisplay = (sub.speaker && sub.speaker !== "無標籤") 
                    ? `<div class="speaker-badge">👤 ${sub.speaker}</div>` 
                    : `<div class="speaker-badge" style="background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.1); color:rgba(255,255,255,0.4)">無標籤</div>`;

                item.innerHTML = `
                    <div>
                        ${speakerDisplay}
                        <div style="color:${sub.color}; font-size:18px; font-weight:500;">${sub.text}</div>
                    </div>
                    <div>
                        <button class="btn btn-live" onclick="sendToLive(${index})">放送</button>
                        <button class="btn" onclick="editSubtitle(${sub.id})">編輯</button>
                        <button class="btn" style="background:rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.3);" onclick="deleteSubtitle(${sub.id}, '${sub.text}')">刪除</button>
                    </div>
                `;
                listEl.appendChild(item);
            });
        }

        function switchScene(sceneName) {
            projectData.currentScene = sceneName;
